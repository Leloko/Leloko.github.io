	<script>
	document.querySelectorAll('[data-slider]').forEach(slider => {
	    const slides = slider.querySelectorAll('.slide');
	    let index = 0;
	
	    setInterval(() => {
	        slides[index].classList.remove('active');
	        index = (index + 1) % slides.length;
	        slides[index].classList.add('active');
	    }, 3000); // 3 seconds
	});
	</script>
