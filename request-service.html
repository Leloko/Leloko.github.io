<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Request service | Leloko Lepolesa</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <h1>Leloko James Lepolesa</h1>
        <nav>
            <ul>
                <li><a href="index.html"><strong>Home</strong></a></li>
                <li><a href="education.html"><strong>Education</strong></a></li>
                <li><a href="certifications.html"><strong>AI Certifications</strong></a></li>
                <li><a href="projects.html"><strong>Projects</strong></a></li>
                <li><a href="publications.html"><strong>Publications</strong></a></li>
                <li><a href="work_experience.html"><strong>Work Experience</strong></a></li>
                <li><a href="hobbies.html"><strong>Hobbies</strong></a></li>
                <li><a href="request-service.html"><strong>Request service</strong></a></li>
            </ul>
        </nav>
    </header>

    <!-- Email delivery: sign up free at https://web3forms.com and paste your Access Key into the hidden access_key field (replace WEB3FORMS_ACCESS_KEY). -->
    <section class="content">
        <h2>Request service</h2>
        <p class="form-intro">
            Use this form to describe what you need. Submissions are delivered by email.
        </p>

        <form id="service-request-form" class="service-form" novalidate>
            <input type="hidden" name="access_key" value="925839f0-83ff-41a5-aef9-05fe6df1e3fa">
            <input type="hidden" name="subject" value="Website: service request">
            <input type="hidden" name="name" id="combined-display-name" value="">
            <input type="checkbox" name="botcheck" class="form-honeypot" tabindex="-1" autocomplete="off" aria-hidden="true">

            <label for="first-name">Name <span class="required-mark">(required)</span></label>
            <input type="text" id="first-name" name="first_name" required maxlength="120" autocomplete="given-name">

            <label for="surname">Surname <span class="required-mark">(required)</span></label>
            <input type="text" id="surname" name="surname" required maxlength="120" autocomplete="family-name">

            <label for="organisation">Name of organisation <span class="optional-mark">(optional)</span></label>
            <input type="text" id="organisation" name="organisation" maxlength="200" autocomplete="organization">

            <label for="contact-email">Contact email <span class="required-mark">(required)</span></label>
            <input type="email" id="contact-email" name="email" required maxlength="254" autocomplete="email">

            <label for="query">Request / query <span class="required-mark">(required)</span></label>
            <textarea id="query" name="message" required rows="6" maxlength="8000"></textarea>

            <button type="submit" class="btn-send" id="send-btn">Send</button>
        </form>

        <p class="form-status" id="form-status" role="status" aria-live="polite"></p>
    </section>

    <footer>
        <p>&copy; Monna oa Matlameng le Pitseng</p>
    </footer>

    <script>
        (function () {
            var form = document.getElementById('service-request-form');
            var statusEl = document.getElementById('form-status');
            var sendBtn = document.getElementById('send-btn');
            var accessInput = form.querySelector('input[name="access_key"]');

            form.addEventListener('submit', function (e) {
                e.preventDefault();
                statusEl.textContent = '';
                statusEl.className = 'form-status';

                if (!accessInput.value || accessInput.value === 'WEB3FORMS_ACCESS_KEY') {
                    statusEl.textContent = 'This form is not configured yet. Add your free Web3Forms access key in request-service.html (see comment in the file).';
                    statusEl.classList.add('form-status-error');
                    return;
                }

                if (!form.reportValidity()) {
                    return;
                }

                var first = document.getElementById('first-name').value.trim();
                var last = document.getElementById('surname').value.trim();
                document.getElementById('combined-display-name').value = (first + ' ' + last).trim();

                sendBtn.disabled = true;
                sendBtn.textContent = 'Sending…';

                var body = new FormData(form);

                fetch('https://api.web3forms.com/submit', {
                    method: 'POST',
                    body: body
                })
                    .then(function (res) { return res.json(); })
                    .then(function (data) {
                        if (data.success) {
                            statusEl.textContent = 'Thank you. Your message was sent.';
                            statusEl.classList.add('form-status-success');
                            form.reset();
                        } else {
                            statusEl.textContent = data.message || 'Something went wrong. Please try again later.';
                            statusEl.classList.add('form-status-error');
                        }
                    })
                    .catch(function () {
                        statusEl.textContent = 'Could not send right now. Check your connection and try again.';
                        statusEl.classList.add('form-status-error');
                    })
                    .finally(function () {
                        sendBtn.disabled = false;
                        sendBtn.textContent = 'Send';
                    });
            });
        })();
    </script>
</body>
</html>
